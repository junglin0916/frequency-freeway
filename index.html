<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Frequency Freeway - Universal 3D Touch Edition</title>
    <style>
        body {
            margin: 0;
            padding: 0;
            background: #090915;
            font-family: 'Arial', sans-serif;
            overflow: hidden;
            color: white;
            user-select: none;
            -webkit-user-select: none;
            perspective: 1000px; /* True 3D spatial perspective */
            cursor: pointer;
            touch-action: none; /* Prevents default iPad gestures from interfering with driving */
        }
        #game-container {
            position: relative;
            width: 100vw;
            height: 100vh;
            background: linear-gradient(to bottom, #020208 15%, #111126 45%, #05050d 100%);
            overflow: hidden;
        }

        /* Fixed Top Prompt Box - Layered safely above everything */
        #prompt-box {
            position: absolute;
            top: 20px;
            left: 50%;
            transform: translateX(-50%);
            background: #f1c40f;
            color: #111;
            padding: 15px 30px;
            font-size: 26px;
            font-weight: bold;
            border-radius: 12px;
            box-shadow: 0 8px 20px rgba(0,0,0,0.6);
            z-index: 100; /* Highest priority layer: can never be blocked */
            text-align: center;
            width: 85%;
            max-width: 900px;
            line-height: 1.4;
            border: 3px solid #fff;
            box-sizing: border-box;
        }

        /* Header UI Scoreboard Layered safely just below prompt box */
        #ui-header {
            position: absolute;
            top: 170px;
            left: 5%;
            right: 5%;
            display: flex;
            justify-content: space-between;
            align-items: center;
            background: rgba(0,0,0,0.85);
            padding: 10px 25px;
            border-radius: 8px;
            border: 2px solid #444;
            z-index: 90;
        }
        .score-box { font-size: 24px; font-weight: bold; }
        #turn-indicator { font-size: 26px; font-weight: bold; text-align: center; }
        
        /* Real-time Dynamic Score Value Indicator Box */
        #bonus-meter {
            background: #2ecc71;
            color: #fff;
            padding: 4px 15px;
            border-radius: 20px;
            font-size: 22px;
            font-weight: bold;
            box-shadow: 0 0 10px rgba(46, 204, 113, 0.5);
        }

        /* 3D 3-Dimensional Highway Canvas Track */
        #highway-3d {
            position: absolute;
            bottom: 0;
            left: 50%;
            width: 1200px;
            height: 78vh;
            background: #1e1e24;
            transform: translateX(-50%) rotateX(65deg); /* Slanted 3D road perspective matrix */
            transform-origin: bottom center;
            border-left: 12px solid #f1c40f;
            border-right: 12px solid #f1c40f;
            box-shadow: 0 25px 60px rgba(0,0,0,0.9);
            z-index: 5;
            overflow: hidden;
        }
        /* Center Lanes Divider Dash Inside the 3D grid with arcade scrolling trick */
        .lane-divider {
            position: absolute;
            top: -100px;
            bottom: -100px;
            left: 50%;
            width: 10px;
            background: repeating-linear-gradient(to bottom, #fff 0px, #fff 40px, transparent 40px, transparent 80px);
            opacity: 0.7;
            transform: translateX(-50%);
        }

        /* High-Velocity Controlled Car */
        #car {
            position: absolute;
            bottom: 60px;
            left: 50%;
            width: 140px;
            height: 95px;
            border-radius: 18px 18px 10px 10px;
            transform: translateX(-50%) rotateX(20deg); /* Counter-angled aerodynamic 3D skew */
            transform-origin: bottom center;
            z-index: 50; /* Hovers perfectly above the road floor */
            pointer-events: none; /* Prevents blocking underlying input events */
            box-shadow: 0 15px 30px rgba(0,0,0,0.7);
            transition: left 0.15s ease-out; /* Smooth lane transitions on mobile snaps */
        }
        #car::before {
            content: '';
            position: absolute;
            top: 15px; left: 18px; width: 104px; height: 25px;
            background: #a2c4c9; border-radius: 5px; opacity: 0.85;
            box-shadow: inset 0 2px 5px rgba(255,255,255,0.5);
        }

        /* Giant 3D Speech Bubbles extending dynamically through depth fields */
        .bubble {
            position: absolute;
            width: 370px;
            height: 180px;
            background: rgba(41, 128, 185, 0.95);
            border: 6px solid #3498db;
            border-radius: 24px;
            display: flex;
            align-items: center;
            justify-content: center;
            text-align: center;
            padding: 20px;
            box-sizing: border-box;
            font-size: 26px;
            font-weight: bold;
            color: white;
            text-shadow: 2px 2px 5px rgba(0,0,0,0.9);
            box-shadow: 0 15px 35px rgba(0,0,0,0.6);
            z-index: 20;
            transform-origin: center center;
            pointer-events: none;
            transform: translate(-50%, -50%) scale(0.2); 
        }

        /* Educational Review Popup overlay window */
        #feedback {
            position: absolute;
            top: 50%; left: 50%;
            transform: translate(-50%, -50%);
            background: rgba(8, 8, 18, 0.99);
            border: 6px solid #fff;
            padding: 35px;
            border-radius: 20px;
            text-align: center;
            display: none;
            z-index: 200; 
            width: 85%;
            max-width: 850px;
            box-shadow: 0 0 70px rgba(0,0,0,0.95);
            box-sizing: border-box;
        }
        #feedback h2 { font-size: 45px; margin-top: 0; }
        #feedback p { font-size: 28px; line-height: 1.6; margin: 25px 0; }
        #feedback button {
            background: #2ecc71; border: none; padding: 15px 50px;
            color: white; font-size: 28px; font-weight: bold; border-radius: 12px; cursor: pointer;
        }

        /* Responsive UI fixes specifically tracking iPad form factors */
        @media (max-width: 1024px) {
            #prompt-box { font-size: 22px; top: 15px; }
            #ui-header { top: 140px; padding: 8px 15px; }
            .score-box { font-size: 18px; }
            #turn-indicator { font-size: 20px; }
            #bonus-meter { font-size: 18px; }
            .bubble { width: 300px; height: 150px; font-size: 20px; border-width: 4px; }
            #feedback h2 { font-size: 35px; }
            #feedback p { font-size: 22px; }
            #feedback button { font-size: 24px; padding: 12px 40px; }
        }
    </style>
</head>
<body>

    <div id="game-container">
        <div id="prompt-box">請點擊或觸碰畫面任一處以啟動遊戲！<br>(Click or Tap anywhere to start!)</div>

        <div id="ui-header">
            <div class="score-box" style="color: #e74c3c;">P1: <span id="p1-score">0</span></div>
            <div id="turn-indicator">Player 1's Turn</div>
            <div id="bonus-meter">Current Value: +20</div>
            <div class="score-box" style="color: #3498db;">P2: <span id="p2-score">0</span></div>
        </div>

        <div id="highway-3d">
            <div id="scrolling-divider" class="lane-divider"></div>
        </div>

        <div id="car"></div>

        <div id="feedback">
            <h2 id="feedback-title">Result</h2>
            <p id="feedback-text">Explanation...</p>
            <button id="next-btn">Next Turn ➔</button>
        </div>
    </div>

    <script>
        const container = document.getElementById('game-container');
        const car = document.getElementById('car');
        const divider = document.getElementById('scrolling-divider');
        const promptBox = document.getElementById('prompt-box');
        const p1ScoreDisplay = document.getElementById('p1-score');
        const p2ScoreDisplay = document.getElementById('p2-score');
        const turnIndicator = document.getElementById('turn-indicator');
        const bonusMeterDisplay = document.getElementById('bonus-meter');
        const feedbackBox = document.getElementById('feedback');
        const feedbackTitle = document.getElementById('feedback-title');
        const feedbackText = document.getElementById('feedback-text');
        const nextBtn = document.getElementById('next-btn');

        let p1Score = 0;
        let p2Score = 0;
        let currentPlayer = 1;
        let carLane = 0; 
        let gameActive = false; 
        let audioCtx = null;
        let currentRoundQuestion = null;
        let activeBubbles = [];
        let musicInterval = null;
        
        let currentQuestionValue = 20; 
        let scrollOffset = 0;
        let gameFirstStart = true;
        let speedMultiplier = 1; 

        // Exact Database synchronized with your uploaded Worksheet document and customized questions
        const quizDatabase = [
            {
                chinese: "你星期日通常在家做什麼？ (Dialogue)",
                correct: "What do you usually do on Sunday?",
                wrong: "What usually do you do on Sunday?",
                exp: "位置規則：疑問句結構為 'What do you + 頻率副詞 + 原形動詞...?'"
            },
            {
                chinese: "你週末會去騎腳踏車嗎？ (Dialogue)",
                correct: "Do you go bicycle riding on the weekend?",
                wrong: "Are you go bicycle riding on the weekend?",
                exp: "一般動詞問句使用助動詞 Do 開頭，不可與 be 動詞 Are 連用。"
            },
            {
                chinese: "我上學從不遲到。 (Sentence Pattern / Exercise 1)",
                correct: "I am never late for school.",
                wrong: "I never am late to school.",
                exp: "be動詞位置規則：be動詞 + 頻率副詞 (am never)。"
            },
            {
                chinese: "他們在早上總是變得很忙碌。 (Sentence Pattern)",
                correct: "They are always busy in the morning.",
                wrong: "They always are busy in the morning.",
                exp: "位置規則：be動詞後面放頻率副詞 (are always)。"
            },
            {
                chinese: "台灣夏天經常是下雨的。 (Sentence Pattern / 重組題)",
                correct: "It is usually rainy in summer.",
                wrong: "It usually is rainy in summer.",
                exp: "位置規則：be動詞後面加上頻率副詞 (is usually)。"
            },
            {
                chinese: "我常在公園騎腳踏車。 (Sentence Pattern)",
                correct: "I often ride a bike in the park.",
                wrong: "I ride often a bike in the park.",
                exp: "一般動詞位置規則：頻率副詞要放在一般動詞前面 (often ride)。"
            },
            {
                chinese: "他們有時候走路去上學。 (Sentence Pattern)",
                correct: "They sometimes walk to school.",
                wrong: "They are sometimes walk to school.",
                exp: "walk 是一般動詞，句子中不需要多餘的 be 動詞 are。"
            },
            {
                chinese: "她很少看電視。 (Sentence Pattern)",
                correct: "She seldom watches TV.",
                wrong: "She watches seldom TV.",
                exp: "一般動詞前面放置頻率副詞 (seldom watches)，且主詞 She 為單數動詞加 es。"
            },
            {
                chinese: "我上學從不遲到。 (Exercise 1 第三題)",
                correct: "I am never late to school.",
                wrong: "I am never late for school.",
                exp: "本題配合學習單 Exercise 1 第3題填空句型：'I am never late to school.' 格式。"
            },
            {
                chinese: "我姐姐很少在晚上洗澡。 (Exercise 1 第四題 / 加入詞練習)",
                correct: "My sister seldom takes a bath at night.",
                wrong: "My sister takes seldom a bath at night.",
                exp: "一般動詞位置規則：頻率副詞 + 一般動詞 (seldom takes)。"
            },
            {
                chinese: "我通常吃蛋和牛奶當早餐。 (將usually加入句子中)",
                correct: "I usually have eggs and milk for my breakfast.",
                wrong: "I have usually eggs and milk for my breakfast.",
                exp: "一般動詞 has/have 前面要加頻率副詞 (usually have)。"
            },
            {
                chinese: "Mandy上學常常遲到。 (將often加入句子中)",
                correct: "Mandy is often late for school.",
                wrong: "Mandy often is late for school.",
                exp: "be動詞位置規則：be動詞後面加上頻率副詞 (is often)。"
            },
            {
                chinese: "你上班總是很早到嗎？ (將usually加入句子中)",
                correct: "Are you usually early to work?",
                wrong: "Do you usually early to work?",
                exp: "early 為形容詞，問句必須使用 Be 動詞 Are 進行提問。"
            },
            {
                chinese: "他放學後常常打籃球嗎？ (將often加入句子中)",
                correct: "Does he often play basketball after school?",
                wrong: "Is he often play basketball after school?",
                exp: "play 是一般動詞，第三人稱單數問句使用助動詞 Does 開頭。"
            },
            {
                chinese: " she會和她媽媽一起去購物。 (將sometimes加入句子中)",
                correct: "She sometimes goes shopping with her mom.",
                wrong: "She goes sometimes shopping with her mom.",
                exp: "一般動詞前面要加上頻率副詞 (sometimes goes)。"
            },
            {
                chinese: "你常遲到嗎?是喔 我很常。 (簡答時頻率副詞位置)",
                correct: "Yes, I usually am.",
                wrong: "Yes, I am usually.",
                exp: "簡答時頻率副詞位置在be動詞後，助動詞/be動詞簡答時要放在前面：I usually am。"
            },
            {
                chinese: "你媽常上班遲到嗎?是喔 她很常。 (簡答時頻率副詞位置)",
                correct: "Yes, she usually does.",
                wrong: "Yes, she does usually.",
                exp: "簡答時頻率副詞位置在一般動詞助動詞前面：she usually does。"
            },
            {
                chinese: "你通常在什麼時候做功課？ (重組練習第一題)",
                correct: "When do you usually do your homework?",
                wrong: "When you usually do do your homework?",
                exp: "特殊疑問句結構：疑問詞 When + 助動詞 do + 主詞 you + 頻率副詞 usually + 動詞原型 do。"
            },
            {
                chinese: "我媽媽在早上總是變得很忙碌。 (重組練習第二題)",
                correct: "My mother is always busy in the morning.",
                wrong: "My mother always is busy in the morning.",
                exp: "正確順序：主詞 + be動詞 + 頻率副詞 (is always) + 形容詞。"
            },
            {
                chinese: "你星期六晚上通常做些什麼？ (重組練習第六題)",
                correct: "What do you usually do on Saturday night?",
                wrong: "What you usually do do on Saturday night?",
                exp: "正確順序：疑問詞 What + 助動詞 do + 主詞 you + usually + 原形動詞 do。"
            }
        ];

        // --- WEB AUDIO AUDIO SYNTH ENGINE ---
        function initAudio() {
            if (!audioCtx) {
                audioCtx = new (window.AudioContext || window.webkitAudioContext)();
                startBackgroundMusic();
            }
        }

        function startBackgroundMusic() {
            const notes = [261.63, 329.63, 392.00, 329.63, 349.23, 440.00, 523.25, 440.00];
            let step = 0;
            musicInterval = setInterval(() => {
                if (!audioCtx || !gameActive) return;
                let osc = audioCtx.createOscillator();
                let gainNode = audioCtx.createGain();
                osc.type = "triangle";
                osc.frequency.setValueAtTime(notes[step % notes.length], audioCtx.currentTime);
                gainNode.gain.setValueAtTime(0.04, audioCtx.currentTime);
                gainNode.gain.exponentialRampToValueAtTime(0.001, audioCtx.currentTime + 0.35);
                osc.connect(gainNode); gainNode.connect(audioCtx.destination);
                osc.start(); osc.stop(audioCtx.currentTime + 0.4);
                step++;
            }, 450);
        }

        function playSound(type) {
            if (!audioCtx) return;
            let now = audioCtx.currentTime;
            if (type === "correct") {
                let osc = audioCtx.createOscillator();
                let gainNode = audioCtx.createGain();
                osc.type = "sine";
                osc.frequency.setValueAtTime(523.25, now);
                osc.frequency.setValueAtTime(659.25, now + 0.1);
                osc.frequency.setValueAtTime(783.99, now + 0.2);
                gainNode.gain.setValueAtTime(0.2, now);
                gainNode.gain.exponentialRampToValueAtTime(0.01, now + 0.5);
                osc.connect(gainNode); gainNode.connect(audioCtx.destination);
                osc.start(now); osc.stop(now + 0.5);
            } else if (type === "wrong" || type === "miss") {
                let osc1 = audioCtx.createOscillator();
                let osc2 = audioCtx.createOscillator();
                let gainNode = audioCtx.createGain();
                osc1.type = "sawtooth"; osc2.type = "sawtooth";
                osc1.frequency.setValueAtTime(85, now); osc1.frequency.linearRampToValueAtTime(45, now + 0.4);
                osc2.frequency.setValueAtTime(82, now); osc2.frequency.linearRampToValueAtTime(40, now + 0.4);
                gainNode.gain.setValueAtTime(0.4, now);
                gainNode.gain.exponentialRampToValueAtTime(0.01, now + 0.45);
                osc1.connect(gainNode); osc2.connect(gainNode); gainNode.connect(audioCtx.destination);
                osc1.start(now); osc2.start(now); osc1.stop(now + 0.45); osc2.stop(now + 0.45);
            }
        }

        // --- UNIVERSAL POSITIONING CONTROLLER (PC MOUSE + IPAD TOUCH) ---
        function handleInputMovement(clientX) {
            if (!gameActive) return;
            const screenWidth = window.innerWidth;
            
            // Checking horizontal alignment splitting boundaries
            if (clientX < screenWidth * 0.5) {
                carLane = 0; 
                car.style.left = (screenWidth * 0.5 - 200) + 'px';
            } else {
                carLane = 1; 
                car.style.left = (screenWidth * 0.5 + 200) + 'px';
            }
        }

        // Mouse listeners
        window.addEventListener('mousemove', (e) => {
            handleInputMovement(e.clientX);
        });

        // iPad Touch listeners
        window.addEventListener('touchstart', (e) => {
            if(e.touches.length > 0) {
                handleInputMovement(e.touches[0].clientX);
            }
        });
        window.addEventListener('touchmove', (e) => {
            if(e.touches.length > 0) {
                handleInputMovement(e.touches[0].clientX);
            }
        });

        // --- UNIVERSAL PRESS EVENT HANDLER (LAUNCHING & RUSH ENGINE) ---
        function triggerMainAction(e) {
            // Safe intercept ensuring modal window buttons bypass game acceleration
            if (e.target.tagName === 'BUTTON' || feedbackBox.style.display === 'block') return;

            if (gameFirstStart) {
                gameFirstStart = false;
                initAudio();
                gameActive = true;
                startRound();
            } else if (gameActive && speedMultiplier === 1) {
                // RUSH MECHANISM TRIGGERED ON CLICK/TOUCH
                speedMultiplier = 12; 
                bonusMeterDisplay.innerText = `RUSHING! Locked: +${currentQuestionValue}`;
                bonusMeterDisplay.style.backgroundColor = "#9b59b6"; 
            }
        }

        window.addEventListener('click', triggerMainAction);
        window.addEventListener('touchend', (e) => {
            // Prevent duplicated click firings on mobile browser engines
            e.preventDefault();
            triggerMainAction(e);
        });

        function updateCarSkin() {
            const isP1 = currentPlayer === 1;
            car.style.backgroundColor = isP1 ? '#e74c3c' : '#3498db';
            car.style.boxShadow = isP1 
                ? '0 12px 30px rgba(231, 76, 60, 0.7), inset 0 -15px 0 #c0392b' 
                : '0 12px 30px rgba(52, 152, 219, 0.7), inset 0 -15px 0 #2980b9';
            
            turnIndicator.innerText = isP1 
                ? "👉 Player 1 (Red) - Slide & Tap to SLAM! 👈" 
                : "👉 Player 2 (Blue) - Slide & Tap to SLAM! 👈";
            turnIndicator.style.color = isP1 ? '#e74c3c' : '#3498db';
        }

        function startRound() {
            if (!gameActive) return;
            
            activeBubbles.forEach(b => b.element.remove());
            activeBubbles = [];
            speedMultiplier = 1; 

            currentQuestionValue = 20;
            bonusMeterDisplay.innerText = "Current Value: +20";
            bonusMeterDisplay.style.backgroundColor = "#2ecc71";

            currentRoundQuestion = quizDatabase[Math.floor(Math.random() * quizDatabase.length)];
            promptBox.innerText = "請找出正確的句子：\n" + currentRoundQuestion.chinese;
            updateCarSkin();

            const correctLane = Math.floor(Math.random() * 2);
            const screenWidth = window.innerWidth;

            const lanes = [0, 1];
            lanes.forEach(laneIndex => {
                const bubbleElement = document.createElement('div');
                bubbleElement.className = 'bubble';
                
                const isCorrect = (laneIndex === correctLane);
                bubbleElement.innerText = isCorrect ? currentRoundQuestion.correct : currentRoundQuestion.wrong;
                
                container.appendChild(bubbleElement);
                activeBubbles.push({
                    element: bubbleElement,
                    isCorrect: isCorrect,
                    lane: laneIndex,
                    progress: 0
                });
            });

            let progress = 0;
            const interval = setInterval(() => {
                if (!gameActive) {
                    clearInterval(interval);
                    return;
                }

                let stepSpeed = 0.07 * speedMultiplier;
                progress += stepSpeed; 

                scrollOffset += (4 * speedMultiplier);
                divider.style.top = ((-100 + (scrollOffset % 80))) + 'px';

                if (speedMultiplier === 1) {
                    let dynamicValue = Math.max(5, Math.round(20 - (progress / 92) * 15));
                    if (dynamicValue !== currentQuestionValue) {
                        currentQuestionValue = dynamicValue;
                        bonusMeterDisplay.innerText = `Current Value: +${currentQuestionValue}`;
                        if (currentQuestionValue <= 10) {
                            bonusMeterDisplay.style.backgroundColor = "#e67e22"; 
                        } else {
                            bonusMeterDisplay.style.backgroundColor = "#2ecc71";
                        }
                    }
                }

                activeBubbles.forEach(bubble => {
                    bubble.progress = progress;
                    
                    const scale = 0.2 + (bubble.progress / 100) * 0.95; 
                    const verticalPos = 240 + (bubble.progress / 100) * (window.innerHeight - 380);
                    
                    const laneOffset = bubble.lane === 0 ? -70 - (bubble.progress * 3.1) : 70 + (bubble.progress * 3.1);
                    const horizontalPos = (screenWidth * 0.5) + laneOffset;

                    bubble.element.style.top = verticalPos + 'px';
                    bubble.element.style.left = horizontalPos + 'px';
                    bubble.element.style.transform = `translate(-50%, -50%) scale(${scale})`;
                });

                if (progress >= 92) { 
                    clearInterval(interval);
                    
                    const targetedBubble = activeBubbles.find(b => b.lane === carLane);
                    if (targetedBubble) {
                        processResult(targetedBubble.isCorrect, "hit");
                    } else {
                        processResult(false, "miss");
                    }
                }
            }, 16);
        }

        function processResult(isCorrect, action) {
            gameActive = false;
            feedbackBox.style.display = 'block';

            if (action === "hit" && isCorrect) {
                playSound("correct");
                if (currentPlayer === 1) p1Score += currentQuestionValue; else p2Score += currentQuestionValue;
                
                feedbackBox.style.borderColor = '#2ecc71';
                feedbackTitle.innerText = `🎉 正確 (+${currentQuestionValue} POINTS!)`;
                feedbackTitle.style.color = '#2ecc71';
                feedbackText.innerHTML = `太棒了！你選到了正確的句子！因答題速度，獲得了 <b>${currentQuestionValue}</b> 分！<br><br>${currentRoundQuestion.exp}`;
            } else {
                playSound("wrong"); 
                if (currentPlayer === 1) p1Score = Math.max(0, p1Score - 5); else p2Score = Math.max(0, p2Score - 5);
                feedbackBox.style.borderColor = '#e74c3c';
                feedbackTitle.innerText = "💨 答錯或漏掉囉 (INCORRECT!)";
                feedbackTitle.style.color = '#e74c3c';
                feedbackText.innerHTML = "噗～～答案不對或漏掉了！扣 5 分！<br>正確答案是：<br><b>" + currentRoundQuestion.correct + "</b><br><br>" + currentRoundQuestion.exp;
            }

            p1ScoreDisplay.innerText = p1Score;
            p2ScoreDisplay.innerText = p2Score;
        }

        function closeFeedback() {
            feedbackBox.style.display = 'none';
            activeBubbles.forEach(b => b.element.remove());
            activeBubbles = [];
            currentPlayer = currentPlayer === 1 ? 2 : 1;
            gameActive = true;
            setTimeout(startRound, 600);
        }

        // Dedicated click and touch hooks specifically for modal navigation on mobile
        nextBtn.addEventListener('click', closeFeedback);
        nextBtn.addEventListener('touchend', (e) => {
            e.stopPropagation(); // Stops modal click from firing background acceleration
            closeFeedback();
        });
    </script>
</body>
</html>
