<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Frequency Freeway - Complete Classroom Edition with Sound</title>
    <style>
        body {
            margin: 0;
            padding: 0;
            background: #1a1a1a;
            font-family: 'Arial', sans-serif;
            overflow: hidden;
            color: white;
            user-select: none;
        }
        #game-container {
            position: relative;
            width: 100vw;
            height: 100vh;
            background: linear-gradient(to bottom, #111 40%, #2c3e50 100%);
        }
        /* Center Divider for 2 Choice Lanes */
        .lane {
            position: absolute;
            top: 0;
            bottom: 0;
            width: 4px;
            background: dashed #fff;
            opacity: 0.4;
        }
        /* Giant Car */
        #car {
            position: absolute;
            bottom: 40px;
            width: 110px;
            height: 170px;
            border-radius: 15px;
            box-shadow: 0 10px 20px rgba(0,0,0,0.5);
            transition: left 0.15s ease-out, background-color 0.3s;
            z-index: 10;
        }
        #car::before {
            content: '';
            position: absolute;
            top: 35px; left: 15px; width: 80px; height: 35px;
            background: #2c3e50; border-radius: 5px;
        }
        /* Giant Target Prompt Box */
        #prompt-box {
            position: absolute;
            top: 130px;
            left: 50%;
            transform: translateX(-50%);
            background: #f1c40f;
            color: #111;
            padding: 15px 40px;
            font-size: 32px;
            font-weight: bold;
            border-radius: 10px;
            box-shadow: 0 5px 15px rgba(0,0,0,0.4);
            z-index: 20;
            text-align: center;
            width: 75%;
            line-height: 1.4;
        }
        /* Giant Sentence Bubbles */
        .bubble {
            position: absolute;
            width: 340px;
            height: 180px;
            background: rgba(41, 128, 185, 0.95);
            border: 5px solid #3498db;
            border-radius: 20px;
            display: flex;
            align-items: center;
            justify-content: center;
            text-align: center;
            padding: 15px;
            box-sizing: border-box;
            font-size: 26px;
            font-weight: bold;
            color: white;
            text-shadow: 2px 2px 4px rgba(0,0,0,0.8);
            box-shadow: 0 10px 25px rgba(0,0,0,0.5);
        }
        /* Header UI */
        #ui-header {
            position: absolute;
            top: 20px;
            left: 5%;
            right: 5%;
            display: flex;
            justify-content: space-between;
            background: rgba(0,0,0,0.85);
            padding: 15px 30px;
            border-radius: 10px;
            border: 2px solid #555;
            z-index: 25;
        }
        .score-box { font-size: 32px; font-weight: bold; }
        #turn-indicator { font-size: 34px; font-weight: bold; text-align: center; }
        
        /* Educational Feedback Modal */
        #feedback {
            position: absolute;
            top: 50%; left: 50%;
            transform: translate(-50%, -50%);
            background: rgba(15, 15, 15, 0.98);
            border: 6px solid #fff;
            padding: 40px;
            border-radius: 20px;
            text-align: center;
            display: none;
            z-index: 30;
            width: 75%;
            max-width: 850px;
            box-shadow: 0 0 50px rgba(0,0,0,0.8);
        }
        #feedback h2 { font-size: 55px; margin-top: 0; }
        #feedback p { font-size: 32px; line-height: 1.6; margin: 30px 0; }
        #feedback button {
            background: #2ecc71; border: none; padding: 20px 60px;
            color: white; font-size: 32px; font-weight: bold; border-radius: 10px; cursor: pointer;
        }
    </style>
</head>
<body>

    <div id="game-container">
        <div class="lane" style="left: 50%;"></div>

        <div id="ui-header">
            <div class="score-box" style="color: #e74c3c;">P1 (Red): <span id="p1-score">0</span></div>
            <div id="turn-indicator">Player 1's Turn (Click Screen to Start)</div>
            <div class="score-box" style="color: #3498db;">P2 (Blue): <span id="p2-score">0</span></div>
        </div>

        <div id="prompt-box">請點擊畫面的任一處以啟動音效與遊戲！<br>(Click anywhere to activate sounds & start!)</div>
        <div id="car"></div>

        <div id="feedback">
            <h2 id="feedback-title">Result</h2>
            <p id="feedback-text">Explanation...</p>
            <button onclick="closeFeedback()">Next Turn ➔</button>
        </div>
    </div>

    <script>
        const container = document.getElementById('game-container');
        const car = document.getElementById('car');
        const promptBox = document.getElementById('prompt-box');
        const p1ScoreDisplay = document.getElementById('p1-score');
        const p2ScoreDisplay = document.getElementById('p2-score');
        const turnIndicator = document.getElementById('turn-indicator');
        const feedbackBox = document.getElementById('feedback');
        const feedbackTitle = document.getElementById('feedback-title');
        const feedbackText = document.getElementById('feedback-text');

        let p1Score = 0;
        let p2Score = 0;
        let currentPlayer = 1;
        let carLane = 0; // 0: Left Lane, 1: Right Lane
        let gameActive = false; // Starts false until teacher interacts/clicks
        let audioCtx = null;
        let currentRoundQuestion = null;
        let activeBubbles = [];

        // Full 15-Question Database from Worksheet Structure
        const quizDatabase = [
            // --- FOCUS: Action Verbs ("I sometimes do" / "He/She sometimes does") ---
            {
                chinese: "你週末會去騎腳踏車嗎？ (提示：用 do 開頭問句)",
                correct: "Do you go bicycle riding on weekends?",
                wrong: "Are you go bicycle riding on weekends?",
                exp: "問句用 Do you...？ 回答就要用動詞助動詞簡答：'I sometimes do.'"
            },
            {
                chinese: "你星期日通常在家做什麼？ (提示：日常習慣問句)",
                correct: "What do you usually do on Sunday?",
                wrong: "What are you usually do on Sunday?",
                exp: "這是一般動詞問句！ 當被問到習慣時，簡答要配合助動詞：'I sometimes do.'"
            },
            {
                chinese: "我通常吃蛋 and 牛奶當早餐。 (通常：usually)",
                correct: "I usually have eggs and milk for my breakfast.",
                wrong: "I have usually eggs and milk for my breakfast.",
                exp: "頻率副詞位置規則：頻率副詞 + 一般動詞 (usually have)。簡答代換為 'I sometimes do.'"
            },
            {
                chinese: "他放學後常常打籃球嗎？ (提示：主詞為單數 he)",
                correct: "Does he often play basketball after school?",
                wrong: "Is he often play basketball after school?",
                exp: "一般動詞 play 的問句用 Does he...？ 簡答對應為：'He sometimes does'（或自己回答 'I sometimes do'）。"
            },
            {
                chinese: "他們有時候走路去上學。 (有時候：sometimes)",
                correct: "They sometimes walk to school.",
                wrong: "They are sometimes walk to school.",
                exp: "walk 是一般動詞，直接說 They sometimes walk 即可，不需要加 be動詞！此類別簡答用 do。"
            },
            {
                chinese: "我姐姐很少在晚上洗澡。 (很少：seldom)",
                correct: "My sister seldom takes a bath at night.",
                wrong: "My sister takes seldom a bath at night.",
                exp: "頻率副詞位置：頻率副詞 + 一般動詞 (seldom takes)。簡答對應形式為 'She sometimes does'。"
            },
            {
                chinese: "她會和她媽媽一起去購物。 (有時候：sometimes)",
                correct: "She sometimes goes shopping with her mom.",
                wrong: "She goes sometimes shopping with her mom.",
                exp: "加入頻率副詞要放在一般動詞 goes 的前面：'She sometimes goes...'。"
            },
            {
                chinese: "你通常在什麼時候做功課？ (重組練習)",
                correct: "When do you usually do your homework?",
                wrong: "When you usually do do your homework?",
                exp: "助動詞 do 要放在主詞 you 的前面。這種 action verb 問句的簡答也是 'I sometimes do.'"
            },
            {
                chinese: "你星期六晚上通常做些什麼？ (日常習慣問句)",
                correct: "What do you usually do on Saturday night?",
                wrong: "What usually do you do on Saturday night?",
                exp: "問句結構為：疑問詞 + do + 主詞 + usually + 動詞原型。習慣問句簡答：'I sometimes do.'"
            },

            // --- CONTRAST: "To Be" Verbs ("I sometimes am" / "It is") ---
            {
                chinese: "我上學從不遲到。 (從不：never)",
                correct: "I am never late for school.",
                wrong: "I never am late for school.",
                exp: "注意 be動詞的規則：be動詞 + 頻率副詞 (am never)！被詢問時，簡答要用 'I sometimes am.'"
            },
            {
                chinese: "他們在早上總是變得很忙碌。 (總是：always)",
                correct: "They are always busy in the morning.",
                wrong: "They always are busy in the morning.",
                exp: "位置規則：be動詞 + 頻率副詞 (are always)！簡答要對應 be動詞，不可誤用 do！"
            },
            {
                chinese: "台灣夏天經常是下雨的。 (經常：usually)",
                correct: "It is usually rainy in summer.",
                wrong: "It usually is rainy in summer.",
                exp: "位置規則：be動詞 + 頻率副詞 (is usually)。天氣簡答型態：'It usually is.'"
            },
            {
                chinese: "Mandy上學常常遲到。 (常常：often)",
                correct: "Mandy is often late for school.",
                wrong: "Mandy often is late for school.",
                exp: "位置規則：be動詞 + 頻率副詞 (is often)。他人詢問時簡答要說：'She sometimes is.'"
            },
            {
                chinese: "你上班總是很早到嗎？ (通常：usually)",
                correct: "Are you usually early to work?",
                wrong: "Do you usually early to work?",
                exp: "early 是形容詞，問句要用 be動詞問：Are you...？ 被這樣問時，你的簡答必須是：'I sometimes am.' (不能選 do！)"
            },
            {
                chinese: "我媽媽在早上總是變得很忙碌。 (重組練習)",
                correct: "My mother is always busy in the morning.",
                wrong: "My mother always is busy in the morning.",
                exp: "正確字序：主詞 + be動詞 + 頻率副詞 + 形容詞。"
            }
        ];

        // --- SYNTHETIC SOUND ENGINE CODE ---
        function initAudio() {
            if (!audioCtx) {
                audioCtx = new (window.AudioContext || window.webkitAudioContext)();
            }
        }

        function playSound(type) {
            if (!audioCtx) return;
            
            let osc = audioCtx.createOscillator();
            let gainNode = audioCtx.createGain();
            osc.connect(gainNode);
            gainNode.connect(audioCtx.destination);

            let now = audioCtx.currentTime;

            if (type === "correct") {
                // High Pitch Sweet Chime
                osc.type = "sine";
                osc.frequency.setValueAtTime(523.25, now); // C5 note
                osc.frequency.setValueAtTime(659.25, now + 0.1); // E5 note
                gainNode.gain.setValueAtTime(0.3, now);
                gainNode.gain.exponentialRampToValueAtTime(0.01, now + 0.4);
                osc.start(now);
                osc.stop(now + 0.4);
            } else if (type === "wrong") {
                // Harsh Retro Buzz Low Sound
                osc.type = "sawtooth";
                osc.frequency.setValueAtTime(130.81, now); // C3 low note
                osc.frequency.linearRampToValueAtTime(90, now + 0.3);
                gainNode.gain.setValueAtTime(0.4, now);
                gainNode.gain.exponentialRampToValueAtTime(0.01, now + 0.3);
                osc.start(now);
                osc.stop(now + 0.3);
            } else if (type === "miss") {
                // Declining sad slide sound
                osc.type = "triangle";
                osc.frequency.setValueAtTime(220, now);
                osc.frequency.linearRampToValueAtTime(110, now + 0.5);
                gainNode.gain.setValueAtTime(0.3, now);
                gainNode.gain.exponentialRampToValueAtTime(0.01, now + 0.5);
                osc.start(now);
                osc.stop(now + 0.5);
            }
        }

        // --- GAME PLAY LOGIC ---
        function updateCar() {
            const screenWidth = window.innerWidth;
            if (carLane === 0) {
                car.style.left = (screenWidth * 0.25 - 55) + 'px';
            } else {
                car.style.left = (screenWidth * 0.75 - 55) + 'px';
            }

            if (currentPlayer === 1) {
                car.style.backgroundColor = '#e74c3c'; // Red Sports Car
                car.style.boxShadow = '0 0 25px rgba(231, 76, 60, 0.8), inset 0 35px 0 #c0392b';
                turnIndicator.innerText = "👉 Player 1 (Red Car) 👈";
                turnIndicator.style.color = '#e74c3c';
            } else {
                car.style.backgroundColor = '#3498db'; // Blue Sports Car
                car.style.boxShadow = '0 0 25px rgba(52, 152, 219, 0.8), inset 0 35px 0 #2980b9';
                turnIndicator.innerText = "👉 Player 2 (Blue Car) 👈";
                turnIndicator.style.color = '#3498db';
            }
        }

        // Initialize click listener to unlock web browser audio security policy
        window.addEventListener('click', () => {
            if (!audioCtx) {
                initAudio();
                gameActive = true;
                startRound();
            }
        });

        // Keyboard Controls: Left Arrow/A or Right Arrow/D
        window.addEventListener('keydown', (e) => {
            if (!gameActive) return;
            if (e.key === 'ArrowLeft' || e.key === 'a' || e.key === 'A') {
                carLane = 0;
                updateCar();
            }
            if (e.key === 'ArrowRight' || e.key === 'd' || e.key === 'D') {
                carLane = 1;
                updateCar();
            }
        });

        function startRound() {
            if (!gameActive) return;
            
            activeBubbles.forEach(b => b.element.remove());
            activeBubbles = [];

            currentRoundQuestion = quizDatabase[Math.floor(Math.random() * quizDatabase.length)];
            promptBox.innerText = "請找出正確的句子：\n" + currentRoundQuestion.chinese;
            updateCar();

            const correctLane = Math.floor(Math.random() * 2); 
            const screenWidth = window.innerWidth;

            // Generate Correct Bubble
            const bCorrect = document.createElement('div');
            bCorrect.className = 'bubble';
            bCorrect.innerText = currentRoundQuestion.correct;
            bCorrect.style.left = (correctLane === 0 ? (screenWidth * 0.25 - 170) : (screenWidth * 0.75 - 170)) + 'px';
            bCorrect.style.top = '-200px';
            container.appendChild(bCorrect);
            activeBubbles.push({ element: bCorrect, isCorrect: true, lane: correctLane });

            // Generate Wrong Bubble
            const bWrong = document.createElement('div');
            bWrong.className = 'bubble';
            bWrong.innerText = currentRoundQuestion.wrong;
            bWrong.style.left = (correctLane === 0 ? (screenWidth * 0.75 - 170) : (screenWidth * 0.25 - 170)) + 'px';
            bWrong.style.top = '-200px';
            container.appendChild(bWrong);
            activeBubbles.push({ element: bWrong, isCorrect: false, lane: (correctLane === 0 ? 1 : 0) });

            let topPos = -200;
            const interval = setInterval(() => {
                if (!gameActive) {
                    clearInterval(interval);
                    return;
                }

                topPos += 1.20; 
                bCorrect.style.top = topPos + 'px';
                bWrong.style.top = topPos + 'px';

                const carRect = car.getBoundingClientRect();
                
                activeBubbles.forEach(bubble => {
                    const bRect = bubble.element.getBoundingClientRect();
                    if (bRect.bottom >= carRect.top && bRect.top <= carRect.bottom && bubble.lane === carLane) {
                        clearInterval(interval);
                        processResult(bubble.isCorrect, "hit");
                    }
                });

                if (topPos > window.innerHeight - 100) {
                    clearInterval(interval);
                    processResult(false, "miss");
                }

            }, 10);
        }

        function processResult(isCorrect, action) {
            gameActive = false;
            feedbackBox.style.display = 'block';

            if (action === "hit" && isCorrect) {
                playSound("correct"); // Play Chime
                if (currentPlayer === 1) p1Score += 10; else p2Score += 10;
                feedbackBox.style.borderColor = '#2ecc71';
                feedbackTitle.innerText = "🎉 正確 (CORRECT!)";
                feedbackTitle.style.color = '#2ecc71';
                feedbackText.innerHTML = "太棒了！你選到了正確的句子！<br><br>" + currentRoundQuestion.exp;
            } else if (action === "hit" && !isCorrect) {
                playSound("wrong"); // Play Buzz
                if (currentPlayer === 1) p1Score = Math.max(0, p1Score - 5); else p2Score = Math.max(0, p2Score - 5);
                feedbackBox.style.borderColor = '#e74c3c';
                feedbackTitle.innerText = "❌ 答錯了 (WRONG SENTENCE!)";
                feedbackTitle.style.color = '#e74c3c';
                feedbackText.innerHTML = "撞到錯誤的句子囉！扣 5 分！<br><br>" + currentRoundQuestion.exp;
            } else if (action === "miss") {
                playSound("miss"); // Play Sad slide sound
                if (currentPlayer === 1) p1Score = Math.max(0, p1Score - 5); else p2Score = Math.max(0, p2Score - 5);
                feedbackBox.style.borderColor = '#f39c12';
                feedbackTitle.innerText = "😮 漏掉了 (MISSED IT!)";
                feedbackTitle.style.color = '#f39c12';
                feedbackText.innerHTML = "你沒有接住正確的句子！扣 5 分！<br>正確答案是：<br><b>" + currentRoundQuestion.correct + "</b>";
            }

            p1ScoreDisplay.innerText = p1Score;
            p2ScoreDisplay.innerText = p2Score;
        }

        function closeFeedback() {
            feedbackBox.style.display = 'none';
            activeBubbles.forEach(b => b.element.remove());
            activeBubbles = [];
            
            // Switch Player Turn
            currentPlayer = currentPlayer === 1 ? 2 : 1;
            updateCar();
            
            gameActive = true;
            setTimeout(startRound, 1000);
        }
    </script>
</body>
</html>
