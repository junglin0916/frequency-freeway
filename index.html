<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Frequency Freeway - Classroom Edition</title>
    <style>
        body {
            margin: 0;
            padding: 0;
            background: #1a1a1a;
            font-family: 'Arial', sans-serif;
            overflow: hidden;
            color: white;
            user-select: none;
        }
        #game-container {
            position: relative;
            width: 100vw;
            height: 100vh;
            background: linear-gradient(to bottom, #111 40%, #2c3e50 100%);
        }
        /* Massive Road Lanes */
        .lane {
            position: absolute;
            top: 0;
            bottom: 0;
            width: 4px;
            background: dashed #fff;
            opacity: 0.4;
        }
        /* Large Projector-Ready Car */
        #car {
            position: absolute;
            bottom: 50px;
            width: 100px;
            height: 160px;
            border-radius: 15px;
            box-shadow: 0 10px 20px rgba(0,0,0,0.5);
            transition: left 0.2s ease-out, background-color 0.3s;
            z-index: 10;
        }
        /* Windshield for the car */
        #car::before {
            content: '';
            position: absolute;
            top: 35px; left: 12px; width: 76px; height: 35px;
            background: #2c3e50; border-radius: 5px;
        }
        /* Giant Bubble Text for Projector */
        .bubble {
            position: absolute;
            width: 240px;
            height: 240px;
            background: rgba(41, 128, 185, 0.9);
            border: 5px solid #3498db;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            text-align: center;
            padding: 20px;
            box-sizing: border-box;
            font-size: 26px; /* Massive text size */
            font-weight: bold;
            color: white;
            text-shadow: 2px 2px 4px rgba(0,0,0,0.8);
            box-shadow: 0 10px 25px rgba(0,0,0,0.5);
        }
        /* Giant UI Header */
        #ui-header {
            position: absolute;
            top: 20px;
            left: 5%;
            right: 5%;
            display: flex;
            justify-content: space-between;
            background: rgba(0,0,0,0.7);
            padding: 15px 30px;
            border-radius: 10px;
            border: 2px solid #555;
            z-index: 20;
        }
        .score-box {
            font-size: 32px;
            font-weight: bold;
        }
        #turn-indicator {
            font-size: 36px;
            font-weight: bold;
            color: #f1c40f;
            text-align: center;
            text-shadow: 0 0 10px rgba(241,196,15,0.5);
        }
        /* Giant Classroom Explanation Modal */
        #feedback {
            position: absolute;
            top: 50%; left: 50%;
            transform: translate(-50%, -50%);
            background: rgba(15, 15, 15, 0.98);
            border: 6px solid #fff;
            padding: 40px;
            border-radius: 20px;
            text-align: center;
            display: none;
            z-index: 30;
            width: 70%;
            max-width: 800px;
            box-shadow: 0 0 50px rgba(0,0,0,0.8);
        }
        #feedback h2 { 
            font-size: 50px; 
            margin-top: 0; 
        }
        #feedback p { 
            font-size: 32px; 
            line-height: 1.5;
            margin: 30px 0;
        }
        #feedback button {
            background: #2ecc71; border: none; padding: 20px 50px;
            color: white; font-size: 32px; font-weight: bold; border-radius: 10px; cursor: pointer;
            box-shadow: 0 5px 10px rgba(0,0,0,0.3);
        }
        #feedback button:hover { background: #27ae60; }
    </style>
</head>
<body>

    <div id="game-container">
        <div class="lane" style="left: 33.33%;"></div>
        <div class="lane" style="left: 66.66%;"></div>

        <div id="ui-header">
            <div class="score-box" style="color: #e74c3c;">P1 (Red): <span id="p1-score">0</span></div>
            <div id="turn-indicator">Player 1's Turn (Red Car)</div>
            <div class="score-box" style="color: #3498db;">P2 (Blue): <span id="p2-score">0</span></div>
        </div>

        <div id="car"></div>

        <div id="feedback">
            <h2 id="feedback-title">Correct!</h2>
            <p id="feedback-text">Explanation goes here.</p>
            <button onclick="closeFeedback()">Next Turn ➔</button>
        </div>
    </div>

    <script>
        const container = document.getElementById('game-container');
        const car = document.getElementById('car');
        const p1ScoreDisplay = document.getElementById('p1-score');
        const p2ScoreDisplay = document.getElementById('p2-score');
        const turnIndicator = document.getElementById('turn-indicator');
        const feedbackBox = document.getElementById('feedback');
        const feedbackTitle = document.getElementById('feedback-title');
        const feedbackText = document.getElementById('feedback-text');

        let p1Score = 0;
        let p2Score = 0;
        let currentPlayer = 1; // 1 = Red, 2 = Blue
        let carLane = 1; // 0: Left, 1: Middle, 2: Right
        let gameActive = true;
        let bubbleSpawnTimeout;

        // Worksheet Specific Questions Database
        const questions = [
            // Target structures ("I sometimes do" / Action Verbs)
            { text: "Do you usually stay at home on Sunday?", isCorrect: true, exp: "Correct! 'Do you...' questions use the action verb helper in short answers: 'I sometimes do.'" },
            { text: "Do you go bicycle riding on weekends?", isCorrect: true, exp: "Correct! For action items starting with 'Do you', the short answer is: 'I sometimes do.'" },
            { text: "Do you usually do homework after school?", isCorrect: true, exp: "Correct! This uses an action verb loop. Short answer: 'I sometimes do.'" },
            { text: "Does he often play basketball?", isCorrect: true, exp: "Correct! Even though it asks about 'he', it still matches our 'Do/Does' action verb goal! (Short answer: 'He sometimes does / I sometimes do' structure)." },
            { text: "Do you sometimes walk to school?", isCorrect: true, exp: "Correct! It uses the action verb helper: 'I sometimes do.'" },
            
            // Distractors ("To Be" structures - I sometimes am)
            { text: "Are you usually late for school?", isCorrect: false, exp: "Incorrect! 'Are' is a form of 'To Be'. The correct short answer must be: 'I sometimes am.'" },
            { text: "Is it usually rainy in summer?", isCorrect: false, exp: "Incorrect! This describes weather with 'Is'. The short answer must be: 'It usually is.'" },
            { text: "Are you early to work?", isCorrect: false, exp: "Incorrect! This targets the 'To Be' verb 'Are'. The short answer should be: 'I sometimes am.'" },
            { text: "Is your mother always busy?", isCorrect: false, exp: "Incorrect! This uses the 'To Be' structure. Short answer: 'She always is.'" }
        ];

        // Setup Car Theme based on Current Turn
        function updateCarTheme() {
            const laneWidth = window.innerWidth / 3;
            car.style.left = (laneWidth * carLane + (laneWidth / 2) - 50) + 'px';
            
            if (currentPlayer === 1) {
                car.style.backgroundColor = '#e74c3c'; // Red Sports Car
                car.style.boxShadow = '0 0 25px rgba(231, 76, 60, 0.8), inset 0 35px 0 #c0392b';
                turnIndicator.innerText = "👉 Player 1's Turn (Red Car) 👈";
                turnIndicator.style.color = '#e74c3c';
            } else {
                car.style.backgroundColor = '#3498db'; // Blue Sports Car
                car.style.boxShadow = '0 0 25px rgba(52, 152, 219, 0.8), inset 0 35px 0 #2980b9';
                turnIndicator.innerText = "👉 Player 2's Turn (Blue Car) 👈";
                turnIndicator.style.color = '#3498db';
            }
        }
        updateCarTheme();
        window.addEventListener('resize', updateCarTheme);

        // Classroom Keyboard Controls (A/D or Arrows work instantly)
        window.addEventListener('keydown', (e) => {
            if (!gameActive) return;
            if ((e.key === 'ArrowLeft' || e.key === 'a' || e.key === 'A') && carLane > 0) {
                carLane--;
                updateCarTheme();
            }
            if ((e.key === 'ArrowRight' || e.key === 'd' || e.key === 'D') && carLane < 2) {
                carLane++;
                updateCarTheme();
            }
        });

        // Spawn a Slow-Moving Bubble
        function spawnBubble() {
            if (!gameActive) return;

            const bubble = document.createElement('div');
            bubble.className = 'bubble';
            
            // Grab a question randomly from the worksheet list
            const q = questions[Math.floor(Math.random() * questions.length)];
            bubble.innerText = q.text;
            bubble.dataset.isCorrect = q.isCorrect;
            bubble.dataset.exp = q.exp;

            const randomLane = Math.floor(Math.random() * 3);
            const laneWidth = window.innerWidth / 3;
            bubble.style.left = (laneWidth * randomLane + (laneWidth / 2) - 120) + 'px';
            bubble.style.top = '-260px';

            container.appendChild(bubble);

            let topPos = -260;
            const interval = setInterval(() => {
                if (!gameActive) {
                    clearInterval(interval);
                    bubble.remove();
                    return;
                }

                topPos += 2.5; // SLOWED SPEED: Reduced from 5 to 2.5 for easy projector tracking
                bubble.style.top = topPos + 'px';

                // Check collision boxes
                const carRect = car.getBoundingClientRect();
                const bubbleRect = bubble.getBoundingClientRect();

                if (
                    bubbleRect.bottom >= carRect.top &&
                    bubbleRect.top <= carRect.bottom &&
                    bubbleRect.right >= carRect.left &&
                    bubbleRect.left <= carRect.right
                ) {
                    clearInterval(interval);
                    bubble.remove();
                    triggerFeedback(q);
                }

                // Clean up if missed
                if (topPos > window.innerHeight) {
                    clearInterval(interval);
                    bubble.remove();
                    // If they dodge everything, spawn another one for the same player
                    spawnBubble();
                }
            }, 10);
        }

        function triggerFeedback(q) {
            gameActive = false;
            feedbackBox.style.display = 'block';
            
            const isTrue = (q.isCorrect === true || q.isCorrect === "true");
            
            if (isTrue) {
                if (currentPlayer === 1) p1Score += 10; else p2Score += 10;
                feedbackBox.style.borderColor = '#2ecc71';
                feedbackTitle.innerText = "🎉 CORRECT!";
                feedbackTitle.style.color = '#2ecc71';
            } else {
                feedbackBox.style.borderColor = '#e74c3c';
                feedbackTitle.innerText = "❌ NOT QUITE!";
                feedbackTitle.style.color = '#e74c3c';
            }
            
            // Render scoreboard updates
            p1ScoreDisplay.innerText = p1Score;
            p2ScoreDisplay.innerText = p2Score;
            feedbackText.innerText = q.exp;
        }

        function closeFeedback() {
            feedbackBox.style.display = 'none';
            
            // Switch Player Turn
            currentPlayer = currentPlayer === 1 ? 2 : 1;
            carLane = 1; // Reset car to middle lane
            updateCarTheme();
            
            gameActive = true;
            // Delay the next spawn slightly so the player can prepare
            setTimeout(spawnBubble, 1000);
        }

        // Start initial spawn sequence
        setTimeout(spawnBubble, 1500);
    </script>
</body>
</html>
